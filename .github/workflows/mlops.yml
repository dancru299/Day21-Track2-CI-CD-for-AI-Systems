name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      old_accuracy: ${{ steps.read_metrics.outputs.old_accuracy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage (AWS)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ fromJSON(secrets.CLOUD_CREDENTIALS).aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ fromJSON(secrets.CLOUD_CREDENTIALS).aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Configure DVC remote
        run: |
          dvc remote remove myremote || true
          dvc remote add -f -d myremote s3://${CLOUD_BUCKET}/dvc

      - name: Pull data with DVC
        run: dvc pull

      - name: Download previous metrics (Bonus 4)
        run: |
          mkdir -p outputs
          aws s3 cp s3://${CLOUD_BUCKET}/models/latest/metrics.json outputs/old_metrics.json || echo "No previous metrics found"

      - name: Train model
        run: python src/train.py

      - name: Read metrics and compare
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          
          if [ -f outputs/old_metrics.json ]; then
            OLD_ACC=$(python -c "import json; print(json.load(open('outputs/old_metrics.json'))['accuracy'])")
          else
            OLD_ACC=0.0
          fi
          echo "old_accuracy=$OLD_ACC" >> $GITHUB_OUTPUT

      - name: Upload model and metrics to Cloud Storage
        run: |
          python - <<'EOF'
          import boto3
          import os

          s3_client = boto3.client('s3')
          bucket = os.environ["CLOUD_BUCKET"]
          s3_client.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          s3_client.upload_file("outputs/metrics.json", bucket, "models/latest/metrics.json")
          print(f"Uploaded models/model.pkl and metrics.json to s3://{bucket}/models/latest/")
          EOF

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-and-report
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          old_acc = float("${{ needs.train.outputs.old_accuracy }}")
          
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
              
          if acc < old_acc:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} thap hon model hien tai ({old_acc:.4f}). Huy deploy do Rollback Logic (Bonus 4).")
              
          print(f"PASSED: accuracy {acc:.4f} >= 0.70 va cao hon/bang model cu ({old_acc:.4f}). Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health
            echo "Health check passed."
